defaults:
  - _self_

experiment:
  name: "co_evolution_run"
  seed: 42
  save_json_logs: true
  # Mini-batch mode: run fewer games per batch so the sleep cycle fires more
  # frequently. run_loop.sh runs MINI_BATCHES × (games + sleep) per outer
  # iteration, then prunes once. Tune concurrent_games × mini_batches to set
  # total games per outer iteration (e.g. 3 × 3 = 9 games before each prune).
  concurrent_games: 3

  # Starting-round diversity — spreads concurrent games across different game
  # phases so the sleep cycle sees early, mid, and late-game situations each batch.
  #
  #   "fixed"      — all games start at round 1 (full 10-round games, default).
  #   "stratified" — games are evenly spaced: with 3 games → rounds 1, 4, 7.
  #                  Guarantees full phase coverage every batch.
  #   "random"     — each game picks uniformly from [min_starting_round, 10].
  #                  Natural coverage over many batches.
  starting_round_strategy: "stratified"
  min_starting_round: 1       # lower bound for "random"; ignored by other strategies

game:
  num_players: 4
  num_rounds: 10

# ---------------------------------------------------------------------------
# vLLM server — launch with:
#
#   vllm serve Qwen/Qwen3-14B-AWQ \
#     --dtype float16 \
#     --quantization awq \
#     --max-model-len 8192 \
#     --gpu-memory-utilization 0.90 \
#     --max-num-seqs 16 \
#     --enable-prefix-caching \
#     --tensor-parallel-size 1 \
#     --port 8000
#
# Alternatives that also fit in 24 GB on a single RTX 3090:
#   Qwen/Qwen3-8B                  (FP16, ~16 GB — no quantisation loss)
#   Qwen/Qwen3-14B-AWQ             (INT4 AWQ, ~9 GB — recommended)
#   bartowski/DeepSeek-R1-Distill-Qwen-14B-exl2  (INT4, ~9 GB — pure reasoning)
#   mistralai/Mistral-Small-3.1-24B-Instruct-2503 (AWQ, ~13 GB — stronger, slower)
# ---------------------------------------------------------------------------
llm:
  base_url: "http://localhost:8000/v1"
  model_name: "Qwen/Qwen3-14B-AWQ"

  # --- Wake cycle (game moves): fast, focused, no deep thinking ---
  temperature: 0.35
  top_p: 0.90
  max_tokens: 1024            # Must cover in-text CoT before [ACTION]: tag; 512 was cutting off mid-reasoning
  enable_thinking: false      # Qwen3 hybrid mode: skip chain-of-thought for speed

  # --- Sleep cycle (reflection): deeper reasoning, more creative rules ---
  reflection_temperature: 0.45
  reflection_top_p: 0.95
  reflection_max_tokens: 2048
  reflection_enable_thinking: true   # Full chain-of-thought for better rule quality

  # --- Pruning cycle (LLM-as-judge): strict, low-temperature analytical judgment ---
  pruner_temperature: 0.10
  pruner_top_p: 0.90
  pruner_max_tokens: 1024
  pruner_enable_thinking: true   # Reasoning helps catch subtle hallucinations

  max_retries: 3

agents:
  p0: "forced_zero"
  p1: "rational"
  p2: "rational"
  p3: "rational"

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true
  verbose:
    - src.agents.llm_agent
