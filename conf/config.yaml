defaults:  
  - _self_  

experiment:
  name: "co_evolution_run"
  seed: 42
  save_json_logs: true

game:
  num_players: 4
  num_rounds: 10

llm:
  #vLLM
  base_url: "http://localhost:8000/v1"
  # model_name: "casperhansen/llama-3-8b-instruct-awq" 
  # model_name: "hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4"
  model_name: "openai/gpt-oss-20b"

  # LM Studio
  # base_url: "http://192.168.1.67:1234/v1"
  # model_name: "local-model"
  temperature: 0.3
  max_retries: 3

agents:
  p0: "forced_zero"
  p1: "rational"  # Changed from Heuristic to LLM
  p2: "rational"  # Changed from Heuristic to LLM
  p3: "rational"  # Changed from Heuristic to LLM

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true  # Changes CWD to the output dir automatically
  verbose:
    - src.agents.llm_agent  # This tells Hydra to show DEBUG logs for the agent